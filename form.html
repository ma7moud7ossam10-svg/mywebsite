<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up Form</title>
</head>
<body>

<h2>Sign Up</h2>

<form action="#" method="GET" novalidate>

    
    <fieldset>
        <legend>Personal Information</legend>

        
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name"
               placeholder="Enter your name"
               required minlength="3" maxlength="20"><br><br>

      
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"
               placeholder="Enter your email"
               required autocomplete="email"><br><br>

      
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"
               required minlength="8"><br><br>

       
        <label for="phone">Phone:</label><br>
        <input type="tel" id="phone" name="phone"
               placeholder="+20 123 456 7890"><br><br>

        
        <label for="website">Website:</label><br>
        <input type="url" id="website" name="website"
               placeholder="https://example.com"><br><br>

       
        <label for="birth">Birth Date:</label><br>
        <input type="date" id="birth" name="birth"
               min="1990-01-01" max="2020-12-31"><br><br>

    </fieldset>

   
    <fieldset>
        <legend>Account Details</legend>

        
        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label><br><br>

       
        <input type="checkbox" id="news" name="newsletter" value="yes">
        <label for="news">Subscribe to newsletter</label><br><br>

        
        <label for="country">Country:</label><br>
        <select id="country" name="country">
            <option value="">-- Select country --</option>
            <option value="eg" selected>Egypt</option>
            <option value="sa">Saudi Arabia</option>
            <option value="us">USA</option>
        </select><br><br>

       
        <label for="lang">Favorite Language:</label><br>
        <input list="languages" id="lang" name="language">

        <datalist id="languages">
            <option value="HTML">
            <option value="CSS">
            <option value="JavaScript">
            <option value="Python">
        </datalist><br><br>

    </fieldset>

    <fieldset>
        <legend>Extra</legend>

        <!-- Number -->
        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" min="1" max="5"><br><br>

        <!-- Range -->
        <label for="vol">Volume:</label><br>
        <input type="range" id="vol" name="vol" min="0" max="50"><br><br>

        <!-- Color -->
        <label for="color">Favorite Color:</label><br>
        <input type="color" id="color" name="color"><br><br>

        <!-- File -->
        <label for="file">Upload Image:</label><br>
        <input type="file" id="file" name="file" accept="image/*" multiple><br><br>

    </fieldset>
    
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
